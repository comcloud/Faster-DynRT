name: Karpathy Autoresearch
description: 深度学习自动实验方法论，让智能体自主迭代优化模型
instructions: |
  当任务是自动科研/自动实验时，遵循以下流程：
  1) 先跑 baseline 建立基线；
  2) 每轮只改一个关键因素（优先模型模块）；
  3) 固定训练预算并完成评估；
  4) 根据主指标执行 keep/discard；
  5) 指标变化率低于阈值且绝对性能不达标时，触发结构重构。

  关键规则：
  - 只优化一个主指标，避免目标漂移；
  - 先模块后参数，先可解释改动后微调；
  - 保持接口兼容，避免破坏训练管线；
  - 失败实验快速止损并修复后再试；
  - 保留最优产物，及时清理冗余日志和中间文件。
